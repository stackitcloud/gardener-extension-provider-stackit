apiVersion: apps/v1
kind: Deployment
metadata:
  name: stackit-pod-identity-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: stackit-pod-identity-webhook
    high-availability-config.resources.gardener.cloud/type: server
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: stackit-pod-identity-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stackit-pod-identity-webhook
        workload-identity.stackit.cloud/skip-pod-identity-webhook: "true"
        gardener.cloud/role: controlplane
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: "topology.kubernetes.io/zone"
          whenUnsatisfiable: DoNotSchedule 
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: stackit-pod-identity-webhook
        - maxSkew: 1
          topologyKey: "kubernetes.io/hostname"
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: stackit-pod-identity-webhook
      automountServiceAccountToken: false
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1239
        runAsGroup: 1239
        fsGroup: 1239
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
        readOnlyRootFilesystem: true
      priorityClassName: gardener-system-200
      containers:
        - name: stackit-pod-identity-webhook
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          image: {{ index .Values.images "stackit-pod-identity-webhook" }}
          args:
            - --cert-dir=/etc/webhook/certs
            - --port={{ .Values.webhook.port }}
          env:
          - name: KUBECONFIG
            value: /var/run/secrets/gardener.cloud/shoot/generic-kubeconfig/kubeconfig
          ports:
            - name: https
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          resources:
              limits:
                memory: 128Mi
              requests:
                cpu: 50m
                memory: 64Mi
          volumeMounts:
            - name: certs
              mountPath: /etc/webhook/certs
              readOnly: true
            - mountPath: /var/run/secrets/gardener.cloud/shoot/generic-kubeconfig
              name: kubeconfig
              readOnly: true
      volumes:
        - name: certs
          secret:
            secretName: {{ .Values.webhook.tlsSecretName }}
        - name: kubeconfig
          projected:
            defaultMode: 420
            sources:
            - secret:
                items:
                  - key: kubeconfig
                    path: kubeconfig
                name: {{ .Values.global.genericTokenKubeconfigSecretName }}
                optional: false
            - secret:
                items:
                  - key: token
                    path: token
                name: shoot-access-pod-identity-webhook
                optional: false