apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stackit-pod-identity-webhook.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackit-pod-identity-webhook.labels" . | nindent 4 }}
    high-availability-config.resources.gardener.cloud/type: server
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "stackit-pod-identity-webhook.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "stackit-pod-identity-webhook.selectorLabels" . | nindent 8 }}
        workload-identity.stackit.cloud/skip-pod-identity-webhook: "true"
        gardener.cloud/role: controlplane
    spec:
      automountServiceAccountToken: false
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1239
        runAsGroup: 1239
        fsGroup: 1239
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      priorityClassName: gardener-system-200
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          image: {{ index .Values.images "stackit-pod-identity-webhook" }}
          args:
            - --cert-dir=/etc/webhook/certs
            - --port={{ .Values.webhook.port }}
          ports:
            - name: https
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: certs
              mountPath: /etc/webhook/certs
              readOnly: true
      volumes:
        - name: certs
          secret:
            secretName: {{ .Values.webhook.tlsSecretName }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
