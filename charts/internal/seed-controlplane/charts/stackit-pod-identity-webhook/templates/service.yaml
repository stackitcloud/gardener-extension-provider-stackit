apiVersion: v1
kind: Service
metadata:
  name: stackit-pod-identity-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: stackit-pod-identity-webhook
  annotations:
    networking.resources.gardener.cloud/from-all-webhook-targets-allowed-ports: '[{"port": 443,"protocol":"TCP"}]'
    service.kubernetes.io/topology-mode: auto
spec:
  type: ClusterIP
  ports:
    - port: 443
      targetPort: {{ .Values.webhook.port }}
      protocol: TCP
      name: https
  selector:
    app.kubernetes.io/name: stackit-pod-identity-webhook
