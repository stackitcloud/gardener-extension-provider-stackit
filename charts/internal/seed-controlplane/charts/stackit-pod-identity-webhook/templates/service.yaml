apiVersion: v1
kind: Service
metadata:
  name: stackit-pod-identity-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    app: kubernetes
    role: stackit-pod-identity-webhook
spec:
  type: ClusterIP
  ports:
  - name: https
    port: 443
    targetPort: {{ .Values.webhook.port }}
    protocol: TCP
  selector:
    app: kubernetes
    role: stackit-pod-identity-webhook
