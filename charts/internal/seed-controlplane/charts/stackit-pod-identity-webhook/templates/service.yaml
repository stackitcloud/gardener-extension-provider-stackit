apiVersion: v1
kind: Service
metadata:
  name: stackit-pod-identity-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: stackit-pod-identity-webhook
  annotations:
    networking.resources.gardener.cloud/from-all-webhook-targets-allowed-ports: {{ printf "'%s%v%s'" "[{\"port\":" .Values.service.port ",\"protocol\":\"TCP\"}]" }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.webhook.port }}
      protocol: TCP
      name: https
  selector:
    app.kubernetes.io/name: stackit-pod-identity-webhook
