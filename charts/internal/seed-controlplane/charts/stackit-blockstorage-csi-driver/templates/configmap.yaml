apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.prefix }}-cloud-provider-config
  namespace: {{ .Release.Namespace }}
data:
  cloud.yaml: |-
    global:
      {{- if .Values.stackitEndpoints.iaasUrl }}
      apiEndpoints:
        iaasApi: {{ .Values.stackitEndpoints.iaasUrl }}
      {{- end }}
      projectId: "{{ .Values.projectID }}"
    blockStorage:
      rescanOnResize: true
